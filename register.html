<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - EduTask</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h2>🎓 EduTask</h2>
                </a>
            </div>
            <div class="navbar-menu">
                <a href="index.html">Accueil</a>
                <a href="index.html#features">Fonctionnalités</a>
                <a href="index.html#how-it-works">Comment ça marche</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <div class="navbar-buttons">
                <a href="login.html" class="btn-login">Connexion</a>
                <button class="btn-signup active">S'inscrire</button>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Register Page -->
    <div class="auth-container">
        <div class="auth-box">
            <h1>EduTask</h1>
            <h2>S'inscrire</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="registerUsername" required placeholder="votre_nom">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="registerPassword" required placeholder="••••••">
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" id="registerConfirm" required placeholder="••••••">
                </div>
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>
            <p class="auth-link">
                Déjà inscrit? <a href="login.html">Se connecter</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
