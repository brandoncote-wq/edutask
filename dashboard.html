<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - EduTask</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="index.html" style="text-decoration: none; color: inherit; display: block;">
                    <h2>🎓 EduTask</h2>
                </a>
            </div>
            <div class="navbar-menu">
                <a href="#" onclick="scrollToSection('dashboard-content'); return false;">Tableau de bord</a>
                <a href="#" onclick="scrollToSection('tasks-section'); return false;">Mes Tâches</a>
            </div>
            <div class="navbar-buttons">
                <span class="user-greeting" id="user-greeting">Bonjour, Utilisateur</span>
                <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <h1>Bienvenue, <span id="user-name">Utilisateur</span>! 📅</h1>
        <p class="dashboard-subtitle">Gérez vos révisions et restez organisé</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-card stat-green">
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Terminées</div>
        </div>
        <div class="stat-card stat-orange">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">En cours</div>
        </div>
        <div class="stat-card stat-blue">
            <div class="stat-value" id="stat-today">0</div>
            <div class="stat-label">Aujourd'hui</div>
        </div>
    </div>

    <div class="dashboard-content" id="dashboard-content">
        <!-- Calendrier -->
        <div class="calendar-section">
            <h3>Calendrier</h3>
            <div id="calendar" class="calendar"></div>
        </div>

        <!-- Tâches -->
        <div class="tasks-section" id="tasks-section">
            <div class="tasks-header">
                <h3>Mes Tâches <span id="tasks-date-title" class="tasks-date-title"></span></h3>
                <div class="tasks-header-btns">
                    <button class="btn-export-ics" onclick="exportToICS()" title="Exporter vers Google Agenda">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Google Agenda
                    </button>
                    <button class="btn-add-task" onclick="openAddTaskModal()">+ Ajouter</button>
                </div>
            </div>
            <div id="tasks-list" class="tasks-list"></div>
        </div>
    </div>

    <!-- Modal Tâche -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAddTaskModal()" aria-label="Fermer">&times;</button>
            <h2>Ajouter une Tâche</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Titre *</label>
                    <input type="text" id="taskTitle" required placeholder="Ex: Révisions Mathématiques">
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" placeholder="Détails, chapitres à revoir..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskDate">Date *</label>
                    <input type="date" id="taskDate" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddTaskModal()">Annuler</button>
                    <button type="submit" class="btn-submit">
                        <span>Créer la tâche</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
