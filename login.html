<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EduTask</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h2>🎓 EduTask</h2>
                </a>
            </div>
            <div class="navbar-menu">
                <a href="index.html">Accueil</a>
                <a href="index.html#features">Fonctionnalités</a>
                <a href="index.html#how-it-works">Comment ça marche</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <div class="navbar-buttons">
                <button class="btn-login active">Connexion</button>
                <a href="register.html" class="btn-signup">S'inscrire</a>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Page -->
    <div class="auth-container">
        <div class="auth-box">
            <h1>EduTask</h1>
            <h2>Connexion</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••">
                </div>
                <button type="submit" class="btn-submit">Se connecter</button>
            </form>
            <p class="auth-link">
                Pas de compte? <a href="register.html">S'inscrire</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
